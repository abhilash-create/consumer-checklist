<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achieving 10/10 for our consumer experience — checklist</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --bg2: #ffffff;
    --bg3: #f0efe9;
    --text: #1a1a18;
    --text2: #5a5a56;
    --text3: #9a9994;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --info-bg: #e6f1fb;
    --info-text: #0c447c;
    --info-border: #b5d4f4;
    --success-bg: #eaf3de;
    --success-text: #27500a;
    --success-border: #c0dd97;
    --warn-bg: #faeeda;
    --warn-text: #633806;
    --warn-border: #fac775;
    --danger-bg: #fcebeb;
    --danger-text: #791f1f;
    --danger-border: #f7c1c1;
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --bg2: #222220;
      --bg3: #2a2a28;
      --text: #e8e6de;
      --text2: #a0a09a;
      --text3: #666660;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --info-bg: #042c53;
      --info-text: #85b7eb;
      --info-border: #185fa5;
      --success-bg: #173404;
      --success-text: #97c459;
      --success-border: #3b6d11;
      --warn-bg: #412402;
      --warn-text: #ef9f27;
      --warn-border: #854f0b;
      --danger-bg: #501313;
      --danger-text: #f09595;
      --danger-border: #a32d2d;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .topbar {
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--info-bg); display: flex; align-items: center;
    justify-content: center; color: var(--info-text); font-size: 16px;
  }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 16px 24px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
  }
  .summary-card {
    background: var(--bg3);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    text-align: center;
  }
  .summary-num { font-size: 22px; font-weight: 600; color: var(--text); }
  .summary-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .main { max-width: 820px; margin: 0 auto; padding: 20px 24px 60px; }

  .phase {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .phase-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; cursor: pointer; user-select: none;
    transition: background .15s;
  }
  .phase-header:hover { background: var(--bg3); }

  .phase-num {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .phase-info { flex: 1; }
  .phase-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .phase-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .phase-right { display: flex; align-items: center; gap: 10px; }
  .phase-count { font-size: 12px; color: var(--text3); }

  .progress-wrap { padding: 0 18px 10px; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--success-text); transition: width .3s; }

  .phase-body { border-top: 0.5px solid var(--border); }
  .phase-body.closed { display: none; }

  .step-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 18px;
    border-bottom: 0.5px solid var(--border);
    transition: background .1s;
  }
  .step-row:last-child { border-bottom: none; }
  .step-row:hover { background: var(--bg3); }

  .check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border2);
    border-radius: 5px; flex-shrink: 0;
    margin-top: 1px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .check:hover { border-color: var(--info-text); }
  .check.done {
    background: var(--success-bg);
    border-color: var(--success-border);
  }

  .step-content { flex: 1; min-width: 0; }
  .step-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .step-title.done { color: var(--text3); text-decoration: line-through; }
  .step-desc { font-size: 12px; color: var(--text2); line-height: 1.55; }
  .step-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }

  .tag {
    font-size: 10px; padding: 2px 8px;
    border-radius: 10px; font-weight: 500;
  }
  .tag-owner { background: var(--info-bg); color: var(--info-text); border: 0.5px solid var(--info-border); }
  .tag-web { background: var(--info-bg); color: var(--info-text); }
  .tag-app { background: var(--warn-bg); color: var(--warn-text); }
  .tag-bo { background: var(--bg3); color: var(--text2); border: 0.5px solid var(--border); }
  .tag-block { background: var(--danger-bg); color: var(--danger-text); border: 0.5px solid var(--danger-border); }

  .issue-section { padding: 14px 18px; background: var(--bg3); }
  .issue-section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; }

  .issue-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .issue-controls select {
    font-size: 12px; padding: 6px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg2); color: var(--text);
    cursor: pointer;
  }

  .issue-input {
    width: 100%; font-size: 12px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    background: var(--bg2); color: var(--text);
    resize: vertical; min-height: 64px;
    font-family: inherit; line-height: 1.5;
  }
  .issue-input:focus { outline: none; border-color: var(--info-text); }

  .issue-btns { display: flex; gap: 8px; margin-top: 8px; }
  .btn {
    font-size: 12px; padding: 7px 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border2);
    background: var(--bg2); color: var(--text);
    cursor: pointer; font-family: inherit;
    transition: all .15s;
  }
  .btn:hover { background: var(--bg3); }
  .btn-warn { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-border); }
  .btn-warn:hover { opacity: .85; }

  .issue-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .issue-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 12px; color: var(--text);
    line-height: 1.5;
  }
  .issue-item.hardening {
    background: var(--warn-bg);
    border-color: var(--warn-border);
  }
  .issue-badge {
    font-size: 10px; padding: 2px 8px;
    border-radius: 8px; font-weight: 600;
    flex-shrink: 0; margin-top: 1px;
    background: var(--bg3); color: var(--text2);
  }
  .issue-item.hardening .issue-badge {
    background: var(--warn-bg); color: var(--warn-text);
    border: 0.5px solid var(--warn-border);
  }
  .issue-text { flex: 1; }
  .issue-meta { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .issue-del {
    color: var(--text3); cursor: pointer; font-size: 14px;
    flex-shrink: 0; padding: 0 2px; line-height: 1;
    opacity: .6; transition: opacity .15s;
  }
  .issue-del:hover { opacity: 1; color: var(--danger-text); }

  .chevron { font-size: 16px; color: var(--text3); transition: transform .2s; }
  .chevron.open { transform: rotate(180deg); }

  .empty-issues { font-size: 12px; color: var(--text3); text-align: center; padding: 10px 0; }

  @media (max-width: 600px) {
    .summary-bar { grid-template-columns: repeat(2, 1fr); }
    .topbar { padding: 12px 16px; }
    .main { padding: 16px; }
    .phase-header { padding: 12px 14px; }
    .step-row { padding: 10px 14px; }
  }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    border: 2px solid var(--bg2);
    margin-left: -6px; cursor: default;
    position: relative;
  }
  .avatar:first-child { margin-left: 0; }
  .avatar-tip {
    display: none; position: absolute; bottom: calc(100% + 6px);
    left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg2);
    font-size: 10px; padding: 3px 8px; border-radius: 4px;
    white-space: nowrap; pointer-events: none; z-index: 20;
  }
  .avatar:hover .avatar-tip { display: block; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo"><i class="ti ti-rocket"></i></div>
    <div>
      <div class="topbar-title">Achieving 10/10 for our consumer experience</div>
      <div class="topbar-sub">Launch checklist</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div id="team-avatars" style="display:flex;gap:4px"></div>
    <div style="font-size:12px;color:var(--text3)" id="progress-pct">0% complete</div>
  </div>
</div>

<div class="summary-bar">
  <div class="summary-card"><div class="summary-num" id="s-done">0</div><div class="summary-label">Completed</div></div>
  <div class="summary-card"><div class="summary-num" id="s-total">0</div><div class="summary-label">Total steps</div></div>
  <div class="summary-card"><div class="summary-num" id="s-issues">0</div><div class="summary-label">Issues logged</div></div>
  <div class="summary-card"><div class="summary-num" id="s-hard">0</div><div class="summary-label">In hardening</div></div>
</div>

<div class="main" id="plan"></div>

<script>
const phases = [
  {
    num:1, color:'#185FA5', bg:'#E6F1FB',
    title:'Demo MVNO creation — back office',
    meta:'Abhilash · Abhijeet · Vineeth · Dipali',
    steps:[
      {title:'Create a demo MVNO in back office',desc:'Set up a test brand with a real name, logo, colour, and plan. Use realistic data — not placeholder text.',tags:[{l:'Back office',c:'tag-bo'},{l:'Blocker',c:'tag-block'}]},
      {title:'Verify brand config reflects on web',desc:'Logo, primary colour, plan name, pricing, and domain all rendering correctly on the demo website.',tags:[{l:'Web',c:'tag-web'},{l:'Blocker',c:'tag-block'}]},
      {title:'Verify brand config reflects on app',desc:'Same check on the mobile app — brand colour, logo, plan cards, and plan name all pulling from back office config.',tags:[{l:'App',c:'tag-app'},{l:'Blocker',c:'tag-block'}]},
      {title:'Verify plan pricing displays correctly',desc:'Check $X/mo format, no decimal on whole amounts, billing period shown. Matches the content standards exactly.',tags:[{l:'Web',c:'tag-web'},{l:'App',c:'tag-app'}]},
      {title:'Verify eSIM / SIM activation flow works end-to-end',desc:'Complete a full test activation on both web and app. Confirm all status messages, loading states, and confirmation screens appear.',tags:[{l:'Web',c:'tag-web'},{l:'App',c:'tag-app'},{l:'Blocker',c:'tag-block'}]},
    ]
  },
  {
    num:2, color:'#0F6E56', bg:'#E1F5EE',
    title:'Style guide & content audit — web',
    meta:'Abhijeet · Dipali · Abhilash',
    steps:[
      {title:'Share content standards playbook with Jules',desc:'Send the full guideline doc covering language, pricing, errors, onboarding, card display, and notifications.',tags:[{l:'Jules',c:'tag-owner'}]},
      {title:'Typography and visual consistency check',desc:'Font, size, weight, sentence case on all headings, buttons, and labels. No Title Case, no ALL CAPS.',tags:[{l:'Web',c:'tag-web'},{l:'Jules',c:'tag-owner'}]},
      {title:'All price values match format standard',desc:'Every price on web: $X/mo, no trailing zero on whole amounts, billing period visible.',tags:[{l:'Web',c:'tag-web'}]},
      {title:'Error messages reviewed against standard',desc:'Walk through every error state: form validation, payment errors, empty states, system errors. All match the avoid/use-this pairs.',tags:[{l:'Web',c:'tag-web'},{l:'Jules',c:'tag-owner'}]},
      {title:'Onboarding flow copy review',desc:'Step indicators present, permission explanations correct, confirmation screens reassure, loading states have copy.',tags:[{l:'Web',c:'tag-web'},{l:'Jules',c:'tag-owner'}]},
      {title:'Card and account display checked',desc:'Credit card shown as Visa ···· 4242, phone numbers formatted, SIM ICCID masked, data in GB/MB with space.',tags:[{l:'Web',c:'tag-web'}]},
      {title:'Button labels are action-led',desc:'No "Submit", "OK", "Yes" alone. All buttons say what they do.',tags:[{l:'Web',c:'tag-web'},{l:'Jules',c:'tag-owner'}]},
      {title:'Notification and alert copy reviewed',desc:'Toast messages under 60 chars, push notification titles under 40 chars, SMS starts with [BrandName].',tags:[{l:'Web',c:'tag-web'}]},
    ]
  },
  {
    num:3, color:'#0F6E56', bg:'#E1F5EE',
    title:'Style guide & content audit — app',
    meta:'Vineeth · Abhilash · Dipali',
    steps:[
      {title:'Typography and visual consistency check',desc:'Same as web — font, size, weight, sentence case. Confirm app uses the same design tokens as web.',tags:[{l:'App',c:'tag-app'},{l:'Jules',c:'tag-owner'}]},
      {title:'All price values match format standard',desc:'Every price in the app: $X/mo format, billing period shown, no raw amounts without context.',tags:[{l:'App',c:'tag-app'}]},
      {title:'Error messages reviewed against standard',desc:'All error states on app match the standard. Special attention to payment errors and SIM activation errors.',tags:[{l:'App',c:'tag-app'},{l:'Jules',c:'tag-owner'}]},
      {title:'Onboarding permissions have explanations',desc:'Camera, notification, and location permission requests all have a "why" screen before the system prompt.',tags:[{l:'App',c:'tag-app'}]},
      {title:'Card display and masking verified',desc:'Visa ···· 4242 format, middle dot not asterisk, expiry MM/YY, no full card number ever visible.',tags:[{l:'App',c:'tag-app'},{l:'Jules',c:'tag-owner'}]},
      {title:'Push notification copy reviewed',desc:'Title under 40 chars, body has the relevant number + action. No vague "check your account" messages.',tags:[{l:'App',c:'tag-app'}]},
      {title:'Loading and empty states have copy',desc:'No blank screens, no spinners with no message. Every wait state tells the subscriber what\'s happening.',tags:[{l:'App',c:'tag-app'}]},
    ]
  },
  {
    num:4, color:'#854F0B', bg:'#FAEEDA',
    title:'Manual audit — end-to-end walkthrough',
    meta:'Full team',
    steps:[
      {title:'Full subscriber journey on web — fresh session',desc:'Sign up → choose plan → enter card → activate SIM → view dashboard → top up → check billing. Screenshot every screen.',tags:[{l:'Web',c:'tag-web'}]},
      {title:'Full subscriber journey on app — fresh install',desc:'Same flow on app from a clean install. Check onboarding, activation, usage dashboard, and support entry point.',tags:[{l:'App',c:'tag-app'}]},
      {title:'Cross-check web and app for consistency',desc:'Same screen side-by-side: same labels, same price format, same error text, same button wording. Flag any divergence.',tags:[{l:'Web',c:'tag-web'},{l:'App',c:'tag-app'}]},
      {title:'Jules final sign-off on content standards',desc:'Jules confirms all content standards are applied correctly on both web and app. Written sign-off.',tags:[{l:'Jules',c:'tag-owner'}]},
    ]
  },
  {
    num:5, color:'#A32D2D', bg:'#FCEBEB',
    title:'Issue logging & hardening chain',
    meta:'All teams',
    isIssueLog:true,
    steps:[
      {title:'Log all functionality issues found',desc:'Any broken flow, wrong data, or missing feature goes here — not just style issues. Tag as Web, App, or Back Office.',tags:[{l:'All teams',c:'tag-bo'}]},
      {title:'Share internally with owners',desc:'Every issue is assigned to the right owner immediately. No issue sits unowned.',tags:[{l:'All teams',c:'tag-bo'}]},
      {title:'Add to hardening chain',desc:'All logged issues enter the hardening chain with priority: Blocker (must fix before launch), High (fix in week 1 post-launch), Low (backlog).',tags:[{l:'All teams',c:'tag-bo'}]},
      {title:'Blocker issues resolved and re-verified',desc:'Every Blocker-tagged issue is fixed, re-tested, and signed off before launch day.',tags:[{l:'Blocker',c:'tag-block'}]},
    ]
  }
];

let issues = [];

const team = [
  {name:'Abhilash',  initials:'AL', color:'#185FA5', bg:'#E6F1FB'},
  {name:'Abhijeet',  initials:'AJ', color:'#0F6E56', bg:'#E1F5EE'},
  {name:'Vineeth',   initials:'VI', color:'#854F0B', bg:'#FAEEDA'},
  {name:'Dipali',    initials:'DI', color:'#993556', bg:'#FBEAF0'},
];

function renderTeam() {
  const el = document.getElementById('team-avatars');
  if (!el) return;
  el.innerHTML = team.map(m => `
    <div class="avatar" style="background:${m.bg};color:${m.color}" title="${m.name}">
      ${m.initials}
      <span class="avatar-tip">${m.name}</span>
    </div>`).join('');
}

function saveSate() {
  try {
    const checked = [];
    document.querySelectorAll('.check.done').forEach(c => checked.push(c.dataset.id));
    localStorage.setItem('mvno_checked', JSON.stringify(checked));
    localStorage.setItem('mvno_issues', JSON.stringify(issues));
  } catch(e){}
}

function loadState() {
  try {
    const checked = JSON.parse(localStorage.getItem('mvno_checked') || '[]');
    checked.forEach(id => {
      const el = document.getElementById('chk-' + id);
      if (el) {
        el.classList.add('done');
        el.innerHTML = '<i class="ti ti-check" style="font-size:12px;color:var(--success-text)"></i>';
        const title = document.getElementById('st-' + id);
        if (title) title.classList.add('done');
      }
    });
    issues = JSON.parse(localStorage.getItem('mvno_issues') || '[]');
    renderIssues();
  } catch(e){}
}

function updateSummary() {
  const total = document.querySelectorAll('.check').length;
  const done = document.querySelectorAll('.check.done').length;
  const hard = issues.filter(i => i.hardening).length;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-issues').textContent = issues.length;
  document.getElementById('s-hard').textContent = hard;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-pct').textContent = pct + '% complete';

  phases.forEach((ph, pi) => {
    const bar = document.getElementById('bar-' + pi);
    const cnt = document.getElementById('cnt-' + pi);
    if (!bar) return;
    const pChecks = document.querySelectorAll(`.check[data-phase="${pi}"]`);
    const pDone = document.querySelectorAll(`.check[data-phase="${pi}"].done`);
    bar.style.width = pChecks.length > 0 ? Math.round(pDone.length / pChecks.length * 100) + '%' : '0%';
    if (cnt) cnt.textContent = pDone.length + '/' + pChecks.length;
  });

  saveSate();
}

function toggleCheck(id) {
  const chk = document.getElementById('chk-' + id);
  const title = document.getElementById('st-' + id);
  chk.classList.toggle('done');
  chk.innerHTML = chk.classList.contains('done') ? '<i class="ti ti-check" style="font-size:12px;color:var(--success-text)"></i>' : '';
  if (title) title.classList.toggle('done', chk.classList.contains('done'));
  updateSummary();
}

function togglePhase(i) {
  const body = document.getElementById('pb-' + i);
  const chev = document.getElementById('chev-' + i);
  body.classList.toggle('closed');
  chev.classList.toggle('open', !body.classList.contains('closed'));
}

function addIssue(hardening) {
  const text = document.getElementById('issue-text').value.trim();
  const type = document.getElementById('issue-type').value;
  const sev = document.getElementById('issue-severity').value;
  if (!text) return;
  issues.push({ text, tag: type + ' · ' + sev, hardening, id: Date.now() });
  document.getElementById('issue-text').value = '';
  renderIssues();
  updateSummary();
}

function deleteIssue(id) {
  issues = issues.filter(i => i.id !== id);
  renderIssues();
  updateSummary();
}

function renderIssues() {
  const el = document.getElementById('issue-list');
  if (!el) return;
  if (issues.length === 0) {
    el.innerHTML = '<p class="empty-issues">No issues logged yet.</p>';
    return;
  }
  el.innerHTML = issues.map(iss => `
    <div class="issue-item ${iss.hardening ? 'hardening' : ''}">
      <span class="issue-badge">${iss.hardening ? 'Hardening' : 'Issue'}</span>
      <span class="issue-text">${iss.text}</span>
      <span class="issue-meta">${iss.tag}</span>
      <span class="issue-del" onclick="deleteIssue(${iss.id})" title="Remove"><i class="ti ti-x" style="font-size:12px"></i></span>
    </div>`).join('');
}

const plan = document.getElementById('plan');
phases.forEach((ph, pi) => {
  const tagsHtml = s => (s.tags || []).map(t => `<span class="tag ${t.c}">${t.l}</span>`).join('');
  const stepsHtml = ph.steps.map((s, si) => {
    const id = `${pi}-${si}`;
    return `<div class="step-row">
      <div class="check" id="chk-${id}" data-id="${id}" data-phase="${pi}" onclick="toggleCheck('${id}')"></div>
      <div class="step-content">
        <div class="step-title" id="st-${id}">${s.title}</div>
        <div class="step-desc">${s.desc}</div>
        <div class="step-tags">${tagsHtml(s)}</div>
      </div>
    </div>`;
  }).join('');

  const issueHtml = ph.isIssueLog ? `
    <div class="issue-section">
      <div class="issue-section-title">Log an issue</div>
      <div class="issue-controls">
        <select id="issue-type">
          <option>Web</option><option>App</option><option>Back office</option><option>Content</option>
        </select>
        <select id="issue-severity">
          <option>Blocker</option><option>High</option><option>Low</option>
        </select>
      </div>
      <textarea class="issue-input" id="issue-text" placeholder="Describe the issue — e.g. 'Price shows $9.990 instead of $9.99 on plan card (web)'"></textarea>
      <div class="issue-btns">
        <button class="btn" onclick="addIssue(false)">Log issue</button>
        <button class="btn btn-warn" onclick="addIssue(true)">Add to hardening chain</button>
      </div>
      <div id="issue-list" class="issue-list"></div>
    </div>` : '';

  const div = document.createElement('div');
  div.className = 'phase';
  div.innerHTML = `
    <div class="phase-header" onclick="togglePhase(${pi})">
      <div class="phase-num" style="background:${ph.bg};color:${ph.color}">${ph.num}</div>
      <div class="phase-info">
        <div class="phase-title">${ph.title}</div>
        <div class="phase-meta">${ph.meta}</div>
      </div>
      <div class="phase-right">
        <span class="phase-count" id="cnt-${pi}">0/${ph.steps.length}</span>
        <i class="ti ti-chevron-down chevron open" id="chev-${pi}"></i>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="bar-${pi}" style="width:0%"></div></div>
    </div>
    <div class="phase-body" id="pb-${pi}">
      ${stepsHtml}
      ${issueHtml}
    </div>`;
  plan.appendChild(div);
});

loadState();
updateSummary();
renderTeam();
</script>
</body>
</html>
